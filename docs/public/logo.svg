<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g filter="url(#glow)">
    <!-- Outer Hexagon -->
    <path d="M100 20 L170 60 V140 L100 180 L30 140 V60 L100 20Z" 
          stroke="url(#brandGrad)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          fill="rgba(59, 130, 246, 0.05)" />
          
    <!-- Inner Connections -->
    <path d="M100 65 V135 M65 85 L135 115 M135 85 L65 115" 
          stroke="url(#brandGrad)" 
          stroke-width="8" 
          stroke-linecap="round" 
          opacity="0.8" />
          
    <!-- Nodes -->
    <circle cx="100" cy="65" r="8" fill="white" stroke="#3B82F6" stroke-width="4" />
    <circle cx="100" cy="135" r="8" fill="white" stroke="#3B82F6" stroke-width="4" />
    <circle cx="65" cy="85" r="8" fill="white" stroke="#3B82F6" stroke-width="4" />
    <circle cx="135" cy="85" r="8" fill="white" stroke="#3B82F6" stroke-width="4" />
    <circle cx="65" cy="115" r="8" fill="white" stroke="#3B82F6" stroke-width="4" />
    <circle cx="135" cy="115" r="8" fill="white" stroke="#3B82F6" stroke-width="4" />
  </g>
</svg>